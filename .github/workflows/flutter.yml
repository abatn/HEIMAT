name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'src/mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/mobile/**'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub
