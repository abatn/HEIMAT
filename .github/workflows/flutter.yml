name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'src/mobile/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/mobile/**'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [analyze]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --coverage

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze, test]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build for Web
        run: flutter build web --release

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Enable Android platform
        run: |
          flutter create . --platforms android
          sed -i 's/VERSION_1_8/VERSION_17/g' android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: [analyze, test]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - name: Enable iOS platform
        run: flutter create . --platforms ios

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update
        continue-on-error: true

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          zip -r ../ipa/HEIMAT.ipa Payload.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/HEIMAT.ipa

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-ios]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: ipa/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "HEIMAT 2.0 v${{ github.run_number }}"
          body: |
            ## HEIMAT 2.0 Release
            
            ### Downloads
            - **Web App:** https://abatn.github.io/HEIMAT/
            - **Android APK:** Siehe Anhänge
            - **iOS IPA:** Siehe Anhänge
            
            ### Änderungen
            - Automatischer Build via CI/CD
            - Web + Android + iOS unterstützt
          files: |
            apk/app-release.apk
            ipa/HEIMAT.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
