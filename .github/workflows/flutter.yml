name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'src/mobile/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'src/mobile/**'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Check formatting
        run: dart format --set-exit-if-changed .
      - name: Analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [analyze]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Run tests
        run: flutter test --coverage

  smoke:
    name: Smoke (UI Tabs)
    runs-on: ubuntu-latest
    needs: [analyze]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Run UI smoke tests
        run: flutter test test/app_smoke_test.dart

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze, test, smoke]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Build for Web
        run: flutter build web --release
      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: src/mobile/build/web/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [analyze, test, smoke]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - name: Enable Android platform
        run: |
          flutter create . --platforms android
          find . -name "build.gradle" -exec sed -i 's/VERSION_1_8/VERSION_17/g' {} \;
          echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Zulu_jdk/17.0.19-10/x64
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    needs: [analyze, test, smoke]
    defaults:
      run:
        working-directory: src/mobile
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
      - name: Enable iOS platform
        run: flutter create . --platforms ios
      - name: Install dependencies
        run: flutter pub get
      - name: Install CocoaPods
        run: cd ios && pod install --repo-update
        continue-on-error: true
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          if [ -d "Runner.app" ]; then zip -r ../ipa/HEIMAT.ipa Runner.app; elif [ -d "Payload.app" ]; then zip -r ../ipa/HEIMAT.ipa Payload.app; fi
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/HEIMAT.ipa
