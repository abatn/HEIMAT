name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/backend/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint src --ext .ts --ignore-pattern 'src/__tests__/**'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: heimat_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Initialize database
        run: psql -f src/database/schema.sql postgresql://postgres:postgres@localhost:5432/heimat_test

      - name: Run tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: heimat_test
          DB_USER: postgres
          DB_PASSWORD: postgres

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Compile TypeScript
        run: npx tsc --noEmit
