name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/backend/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
