name: heimat_app
description: HEIMAT 2.0 – Die erste Open-Source Super App für Deutschland
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Karten
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  
  # HTTP
  http: ^1.1.0
  
  # State Management
  provider: ^6.1.0
  
  # Lokale Speicherung
  shared_preferences: ^2.2.0
  
  # UI
  flutter_svg: ^2.0.0
  
  # AI / Machine Learning
  path_provider: ^2.1.2
  
  # GPS / Standort
  geolocator: ^14.0.3
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
