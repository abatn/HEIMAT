version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: heimat-db
    environment:
      POSTGRES_DB: heimat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: heimat-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: heimat
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/backend/src:/app/src
    command: npm run dev

volumes:
  pgdata:
