services:
  - type: web
    name: heimat-backend
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd src/backend && npm install --include=dev && npm run build && mkdir -p dist/database && cp src/database/schema.sql dist/database/
    startCommand: cd src/backend && node dist/index.js
    envVars:
      - key: DB_HOST
        value: db.sqbiqzwkcryhcyvftumb.supabase.co
      - key: DB_PORT
        value: 5432
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        fromService:
          name: heimat-redis
          type: redis
          property: connectionString
      - key: DB_REST_URL
        fromService:
          name: heimat-db-rest
          type: web
          property: url

  - type: web
    name: heimat-db-rest
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile.db-rest
    envVars:
      - key: PORT
        value: 3001

databases:
  - name: heimat-redis
    plan: free
    region: frankfurt
    ipAllowList: []
